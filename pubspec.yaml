name: edupath_learning
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  provider: ^6.1.5+1

  # HTTP Client
  http: ^1.1.0
  dio: ^5.3.2

  # JSON
  json_annotation: ^4.9.0
  palette_generator: ^0.3.3+7
  record: ^6.1.1
  just_audio: ^0.9.38
  audio_waveforms: ^1.3.0
  in_app_update: ^4.2.5
  rename: ^3.1.0
  dotted_border: ^3.1.0
  webview_flutter: ^4.8.0
  image_picker: ^1.1.2
  video_player: ^2.9.2
  youtube_player_flutter: ^10.0.1
  flutter_pdfview: ^1.4.4
  path_provider: ^2.1.5
  permission_handler: ^12.0.3
  url_launcher: ^6.3.2
  file_picker: ^11.0.2
  flutter_widget_from_html_core: ^0.17.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/login_image_back.png
    - assets/images/google-icon.png
    - assets/images/apple_logo.png
    - assets/images/live_backImage.png
    - assets/icon/app_icon.png
    - assets/head.jpg
    - assets/quizz.jpg

  fonts:
    - family: Lexend
      fonts:
        - asset: assets/fonts/Lexend-VariableFont_wght.ttf

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"